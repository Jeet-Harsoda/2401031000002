        <main class="content-area showcase-bg">
            <div style="background-color:#e4dcdc; padding:20px; width:100%; margin:0px; color: #000;">
            <h2 class="showcase-title">Cursor Trail Effect</h2>
            </div>
        </main>

        <script>
            let lastX = 0;
            let lastY = 0;
            let hasStarted = false;
            
            // Grab the main content area
            const mainArea = document.querySelector('.content-area');

            function createParticle(x, y) {
                const particle = document.createElement('div');
                particle.className = 'trail-particle';
                particle.style.left = (x - 5) + 'px';
                particle.style.top = (y - 5) + 'px';
                document.body.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 500);
            }

            mainArea.addEventListener('mousemove', function(event) {
                const currentX = event.pageX;
                const currentY = event.pageY;

                if (!hasStarted) {
                    createParticle(currentX, currentY);
                    lastX = currentX;
                    lastY = currentY;
                    hasStarted = true;
                    return;
                }

                const deltaX = currentX - lastX;
                const deltaY = currentY - lastY;
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                const steps = Math.max(1, Math.floor(distance / 10));

                for (let i = 1; i <= steps; i++) {
                    const interpolatedX = lastX + (deltaX * (i / steps));
                    const interpolatedY = lastY + (deltaY * (i / steps));
                    createParticle(interpolatedX, interpolatedY);
                }

                lastX = currentX;
                lastY = currentY;
            });

            mainArea.addEventListener('mouseleave', function() {
                hasStarted = false; 
            });
        </script>
    </div>
