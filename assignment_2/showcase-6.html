        <main class="content-area showcase-bg" style="align-items: center; background-color: #e4dcdc; color:#000;">
            <h2 class="showcase-title">Retro Snake</h2>

            <div class="score-display" style="color: #000;">SCORE: <span id="score">0</span></div>

            <canvas id="gameCanvas" width="1200" height="600"></canvas>

            <button class="retro-btn" id="restart-snake-btn" style="margin-top: 20px;" onclick="window.location.reload();">Restart Game</button>
            
            <p style="margin-top: 15px; font-family: 'Courier New', monospace; color: #000; font-weight: 900;">
                Use ARROW KEYS to move.
            </p>
        </main>
    </div>

    <script>
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");
            const scoreElement = document.getElementById("score");
            

            // Game settings
            const gridSize = 20; // Each square is 20x20 pixels
            const tileCount_x = canvas.width / gridSize;
            const tileCount_y = canvas.height / gridSize; 
            let speed = 10; // Frames per second
            let score = 0;

            // Snake starting position and array (the body)
            let headX = Math.floor(Math.random() * tileCount_x);
            let headY = Math.floor(Math.random() * tileCount_y);
            const snakeParts = [];
            let tailLength = 0;

            // Snake velocity (direction)
            let xVelocity = 0;
            let yVelocity = 0;

            // Apple position
            let appleX = Math.floor(Math.random() * tileCount_x);
            let appleY = Math.floor(Math.random() * tileCount_y);

            // The main game loop
            function drawGame() {
                changeSnakePosition();
                
                // If the game is over, stop the loop
                let result = isGameOver();
                if (result) return;

                clearScreen();
                checkAppleCollision();
                drawApple();
                drawSnake();

                // Call drawGame again after a short delay based on the speed
                setTimeout(drawGame, 1000 / speed);
            }

            function isGameOver() {
                let gameOver = false;

                // Stop if the game hasn't started yet
                if (xVelocity === 0 && yVelocity === 0) return false;

                // Wall collision
                if (headX < 0 || headX >= tileCount_x || headY < 0 || headY >= tileCount_y) {
                    gameOver = true;
                }

                // Self collision (loop through all parts to see if the head hit them)
                for (let i = 0; i < snakeParts.length; i++) {
                    let part = snakeParts[i];
                    if (part.x === headX && part.y === headY) {
                        gameOver = true;
                        break;
                    }
                }

                if (gameOver) {
                    ctx.fillStyle = "white";
                    ctx.font = "30px 'Courier New'";
                    ctx.fillText("GAME OVER!", canvas.width / 2.35, canvas.height / 2);
                }

                return gameOver;
            }

            function clearScreen() {
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            function drawSnake() {
                ctx.fillStyle = "#00FF00"; // Neon green snake

                // Draw the body
                for (let i = 0; i < snakeParts.length; i++) {
                    let part = snakeParts[i];
                    ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
                }

                // Add the current head position to the array
                snakeParts.push({ x: headX, y: headY });
                
                // If the array is longer than the tail length, remove the oldest segment
                while (snakeParts.length > tailLength) {
                    snakeParts.shift();
                }

                // Draw the head (slightly different color to stand out)
                ctx.fillStyle = "white";
                ctx.fillRect(headX * gridSize, headY * gridSize, gridSize - 2, gridSize - 2);
            }

            function changeSnakePosition() {
                headX = headX + xVelocity;
                headY = headY + yVelocity;
            }

            function drawApple() {
                ctx.fillStyle = "red";
                ctx.fillRect(appleX * gridSize, appleY * gridSize, gridSize, gridSize);
            }

            function checkAppleCollision() {
                if (appleX === headX && appleY === headY) {
                    // Move the apple to a new random location
                    appleX = Math.floor(Math.random() * tileCount_x);
                    appleY = Math.floor(Math.random() * tileCount_y);
                    tailLength++;
                    score++;
                    scoreElement.innerText = score;
                }
            }

            // Listen for keyboard input to change direction
            document.body.addEventListener("keydown", keyDown);

            function keyDown(event) {
                // Up arrow
                if (event.keyCode === 38 && yVelocity !== 1) {
                    yVelocity = -1;
                    xVelocity = 0;
                }
                // Down arrow
                if (event.keyCode === 40 && yVelocity !== -1) {
                    yVelocity = 1;
                    xVelocity = 0;
                }
                // Left arrow
                if (event.keyCode === 37 && xVelocity !== 1) {
                    yVelocity = 0;
                    xVelocity = -1;
                }
                // Right arrow
                if (event.keyCode === 39 && xVelocity !== -1) {
                    yVelocity = 0;
                    xVelocity = 1;
                }
            }

            // Start the game!
            drawGame();
        </script>

</body>
